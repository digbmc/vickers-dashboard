<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Lake Vickers Data</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        html, body { max-width: 100vw; overflow-x: hidden; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #002855;
            margin: 0; padding: 0; font-size: 15px;
        }
        .banner-header {
            width: 100%;
            height: 400px;
            background: url('./TitleImage.png') center center/cover no-repeat;
            display: flex;
            align-items: flex-start;
            justify-content: flex-start;
            position: relative;
            margin-bottom: 24px;
            padding: 0 4vw;
            box-sizing: border-box;
        }
        .banner-title {
            font-size: 2.7rem;
            color: #ffffff;
            font-weight: bold;
            margin: 0; padding: 0; border: none; background: none;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.18);
            letter-spacing: 1px;
            flex: 1 1 0;
            text-align: left;
            align-self: flex-start;
            margin-top: 18px; margin-right: 18px;
            max-width: 80vw;
            white-space: normal; overflow: visible; text-overflow: unset; word-break: break-word;
        }
        .banner-logo {
            height: 120px; background: none; box-shadow: none; border: none;
            align-self: flex-start;
            margin-top: 22px; margin-left: 18px;
            max-width: 22vw; width: auto;
        }
        @media (max-width: 900px) {
            .banner-title { font-size: 1.3rem; max-width: 100vw; }
            .banner-header { height: 80px; padding: 0 2vw; }
            .banner-logo { height: 70px; margin-top: 6px; margin-left: 8px; }
        }
        .dashboard-row {
            display: flex; flex-direction: row; align-items: flex-start;
            gap: 0; margin-bottom: 14px; width: 100%;
            box-sizing: border-box; padding-left: 2vw; padding-right: 2vw;
        }
        .map-blurb-row {
            display: flex; flex-direction: row; align-items: stretch;
            width: 100%; gap: 2vw; min-width: 0;
        }
        .main-content {
            display: flex; flex-direction: column; align-items: flex-start;
            flex: 1 1 auto; width: 100%;
        }
        #map {
            width: 100%; min-width: 220px; max-width: 900px;
            aspect-ratio: 9/5;
            border-radius: 10px; box-shadow: 0 2px 8px #0001;
            background: #fff; margin-bottom: 18px; border: none;
            box-sizing: border-box; flex: 1 1 0;
            min-height: 320px; max-height: 600px;
        }
        .blurb-box {
            min-width: 180px; width: 100%; max-width: 400px;
            background: #FFC600; border: 3px solid #FFC600;
            border-radius: 12px; padding: 14px 12px 12px 12px;
            font-size: 1em; color: #000000; box-shadow: 0 2px 8px #0001;
            height: 100%; margin-left: 0; margin-top: 0; margin-bottom: 18px;
            position: relative; box-sizing: border-box;
            word-break: break-word; overflow-wrap: break-word;
            align-self: flex-start;
            display: flex; flex-direction: column; justify-content: flex-start;
            min-height: 320px;
        }
        .blurb-label {
            font-size: 2rem; color: #000000; font-weight: bold;
            margin: 0 0 8px 0; padding: 0; background: none; border: none;
            letter-spacing: 1px; align-self: flex-start;
        }
        .controls {
            display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
            margin-bottom: 20px; padding-left: 8px; padding-right: 8px;
            width: 100%; box-sizing: border-box; font-size: 0.97em;
        }
        .controls label { color: #ffffff; font-weight: bold; font-size: 1em; }
        .controls select {
            font-size: 0.97em; padding: 4px 8px; border-radius: 6px; border: none; cursor: pointer;
        }
        .site-section {
            width: 100%; margin-bottom: 36px;
            padding-left: 8px; padding-right: 8px; box-sizing: border-box;
        }
        .site-section-title {
            font-size: 1.35rem; font-weight: bold;
            margin: 0 0 14px 0; padding-bottom: 6px;
            border-bottom: 2px solid #c9dc8755;
            letter-spacing: 0.5px;
        }
        .sensor-grid {
            display: flex; flex-direction: row; flex-wrap: wrap; gap: 20px;
        }
        .sensor-chart-block {
            display: flex; flex-direction: column;
            background: #fff; border-radius: 12px;
            padding: 10px 14px 12px 14px;
            flex: 1 1 320px; min-width: 260px; max-width: 560px;
            box-sizing: border-box;
            box-shadow: 0 2px 8px #0002;
        }
        .sensor-title {
            font-size: 0.95em; font-weight: bold; color: #134e4a;
            margin-bottom: 6px; text-align: center; letter-spacing: 0.3px;
        }
        .sensor-canvas { width: 100% !important; height: 200px !important; }
        .loading { color: #c9dc87; margin: 8px 0; font-size: 1em; }
        .error-message { color: #f87171; margin: 8px 0; }
        #statusMessage { padding-left: 8px; margin-bottom: 10px; }
        #lastUpdated { color: #94a3b8; font-size: 0.9em; }

        @media (max-width: 600px) {
            .map-blurb-row { flex-direction: column !important; align-items: stretch !important; }
            .blurb-box {
                order: -1; width: 100% !important; max-width: 100vw !important;
                height: auto !important; min-height: 120px; margin-bottom: 14px;
            }
            #map {
                order: 1; width: 100% !important; max-width: 100vw !important;
                min-height: 260px; height: 260px !important; max-height: 340px;
                aspect-ratio: unset; margin-bottom: 18px;
            }
            .sensor-grid { flex-direction: column !important; }
            .sensor-chart-block { max-width: 100vw !important; min-width: unset !important; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>

<body>
    <div class="banner-header">
        <h1 class="banner-title">Lake Vickers Data</h1>
        <img src="Logo.png" alt="Logo" class="banner-logo">
    </div>

    <div class="dashboard-row">
        <div class="main-content">

            <div class="map-blurb-row">
                <div id="map"></div>
                <div class="blurb-box">
                    <span class="blurb-label">About the Project</span>
                    <p style="margin:0;line-height:1.6;color:#000000;font-size:1.125em;">
                        blurb
                    </p>
                </div>
            </div>

            <div class="controls">
                <label for="range">Show data for:</label>
                <select id="range">
                    <option value="1">Past 24 hours</option>
                    <option value="3">Past 3 days</option>
                    <option value="7" selected>Past week</option>
                </select>
                <span id="lastUpdated"></span>
            </div>

            <div id="statusMessage"></div>
            <div id="allCharts" style="width:100%;"></div>

        </div>
    </div>

    <script>
        const baseUrl = (window.location.hostname === 'localhost')
            ? 'http://localhost:3000'
            : 'https://zentra-proxy.onrender.com';

        const sites = [
            { name: "Front Basin",  sn: "z6-29888", lat: 40.0275048, lng: -75.316367,  color: "#10b981" },
            { name: "Lake Vickers", sn: "z6-29887", lat: 40.0278856, lng: -75.3167732, color: "#f59e0b" }
        ];

        let chartInstances = [];

        // ── Map ──────────────────────────────────────────────────────────────
        const map = L.map('map').setView([40.02770, -75.31660], 17);
       L.tileLayer(
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    { attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors' }
).addTo(map);

        sites.forEach(site => {
            const marker = L.marker([site.lat, site.lng]).addTo(map);
            marker.bindPopup(`<b>${site.name}</b>`);
            marker.on('mouseover', function () { this.openPopup(); });
            marker.on('mouseout',  function () { this.closePopup(); });
            marker.on('click', () => {
                const el = document.getElementById(`site-${site.sn}`);
                if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
            });
        });

        // ── Helpers ──────────────────────────────────────────────────────────
        function getRangeDays() {
            return parseInt(document.getElementById('range').value, 10);
        }

        function getStartDate(days) {
            const d = new Date(Date.now() - days * 86400000);
            return d.toISOString().slice(0, 10);
        }

        function filterByDays(readings, days) {
            const cutoff = new Date(Date.now() - days * 86400000);
            return readings.filter(r => new Date(r.datetime) >= cutoff);
        }

        function destroyAllCharts() {
            chartInstances.forEach(c => { try { c.destroy(); } catch (e) {} });
            chartInstances = [];
        }

        function setStatus(msg, isError) {
            document.getElementById('statusMessage').innerHTML =
                `<div class="${isError ? 'error-message' : 'loading'}">${msg}</div>`;
        }

        // ── Fetch ────────────────────────────────────────────────────────────
        async function fetchDevice(sn, days) {
            const params = new URLSearchParams({
                device_sn:  sn,
                per_page:   1000000,
                start_date: getStartDate(days)
            });
            const res = await fetch(`${baseUrl}/zentra?${params}`);
            if (!res.ok) {
                const txt = await res.text().catch(() => '');
                throw new Error(`HTTP ${res.status}: ${txt}`);
            }
            const json = await res.json();
            if (!json.devices || json.devices.length === 0) throw new Error('No device data returned');
            const device = json.devices[0];
            if (device.error) throw new Error(`Zentra: ${device.status} – ${device.body}`);
            return device;
        }

        // ── Render HTML shells ───────────────────────────────────────────────
        function renderSiteHTML(site, device, days) {
            const data = device.data;
            if (!data || typeof data !== 'object') return '';

            let blocksHtml = '';
            Object.keys(data).forEach(key => {
                const arr = data[key];
                if (!Array.isArray(arr) || arr.length === 0) return;
                const entry    = arr[0];
                const units    = entry.metadata && entry.metadata.units ? entry.metadata.units : '';
                const readings = filterByDays(entry.readings || [], days);
                if (readings.length === 0) return;

                const chartId = `chart-${site.sn}-${key.replace(/[^a-zA-Z0-9]/g, '_')}`;
                const label   = units ? `${key} (${units})` : key;
                blocksHtml += `
                    <div class="sensor-chart-block">
                        <div class="sensor-title">${label}</div>
                        <canvas id="${chartId}" class="sensor-canvas"></canvas>
                    </div>`;
            });

            if (!blocksHtml) return '';

            return `
                <div class="site-section" id="site-${site.sn}">
                    <div class="site-section-title" style="color:${site.color}">${site.name}</div>
                    <div class="sensor-grid">${blocksHtml}</div>
                </div>`;
        }

        // ── Build Chart.js instances ─────────────────────────────────────────
        function buildCharts(site, device, days) {
            const data = device.data;
            if (!data || typeof data !== 'object') return;

            Object.keys(data).forEach(key => {
                const arr = data[key];
           if (!Array.isArray(arr) || arr.length === 0) return;
            const isEC = key.toLowerCase().includes('ec');
            if (isEC && arr[0].metadata && arr[0].metadata.port_number !== 2) return;
                const entry    = arr[0];
                const units    = entry.metadata && entry.metadata.units ? entry.metadata.units : '';
                const readings = filterByDays(entry.readings || [], days);
                if (readings.length === 0) return;

                const chartId = `chart-${site.sn}-${key.replace(/[^a-zA-Z0-9]/g, '_')}`;
                const canvas  = document.getElementById(chartId);
                if (!canvas) return;

                const chart = new Chart(canvas.getContext('2d'), {
                    type: 'line',
                    data: {
                        datasets: [{
                            label: units ? `${key} (${units})` : key,
                            data:  readings.map(r => ({ x: r.datetime, y: r.value })),
                            fill: false,
                            borderColor:     site.color,
                            backgroundColor: site.color + '33',
                            borderWidth: 1.5,
                            tension: 0.1,
                            pointRadius: 0
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        animation: false,
                        plugins: { legend: { display: false } },
                        elements: { line: { borderWidth: 1.5 }, point: { radius: 0 } },
                        scales: {
                            x: {
                                type: 'time',
                                time: {
                                    parser: 'yyyy-MM-dd HH:mm:ssXXX',
                                    tooltipFormat: 'PP HH:mm',
                                    unit: 'hour',
                                    displayFormats: { hour: 'MMM d, HH:mm' }
                                }
                            },
                            y: {
                                beginAtZero: false,
                                title: { display: !!units, text: units, font: { size: 11 } }
                            }
                        }
                    }
                });
                chartInstances.push(chart);
            });
        }

        // ── Main load ────────────────────────────────────────────────────────
        async function loadAll() {
            const days = getRangeDays();
            destroyAllCharts();
            document.getElementById('allCharts').innerHTML = '';
            document.getElementById('lastUpdated').textContent = '';
            setStatus('Loading sensor data…');

            // Fetch all sites in parallel, preserve order
            const results = await Promise.all(
                sites.map(async site => {
                    try {
                        const device = await fetchDevice(site.sn, days);
                        return { site, device, error: null };
                    } catch (e) {
                        console.warn(`Failed to load ${site.sn}:`, e);
                        return { site, device: null, error: e.message };
                    }
                })
            );

            // Build HTML for all sites first
            let html = '';
            results.forEach(({ site, device, error }) => {
                if (!device) {
                    html += `
                        <div class="site-section" id="site-${site.sn}">
                            <div class="site-section-title" style="color:${site.color}">${site.name}</div>
                            <div class="error-message">Failed to load data: ${error || 'Unknown error'}</div>
                        </div>`;
                } else {
                    html += renderSiteHTML(site, device, days);
                }
            });

            document.getElementById('statusMessage').innerHTML = '';
            document.getElementById('allCharts').innerHTML = html;

            // Then build charts (canvases now exist in DOM)
            results.forEach(({ site, device }) => {
                if (device) buildCharts(site, device, days);
            });

            document.getElementById('lastUpdated').textContent =
                `Data loaded: ${new Date().toLocaleString()}`;
        }

        document.getElementById('range').addEventListener('change', loadAll);
        loadAll();
    </script>
</body>
</html>
