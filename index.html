<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Lake Vickers Data</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>

        html, body { max-width: 100vw; overflow-x: hidden; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #002858;
            margin: 0; padding: 0; font-size: 15px;
        }

        /* ── Banner ── */
        .banner-header {
            width: 100%; height: 400px;
            background: url('./TitleImage.png') center center/cover no-repeat;
            display: flex; align-items: flex-start; justify-content: flex-start;
            padding: 0 4vw; box-sizing: border-box; margin-bottom: 32px;
        }
        .banner-title {
            font-size: 2.7rem; color: #fff; font-weight: bold;
            margin: 18px 18px 0 0; padding: 0;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.25); letter-spacing: 1px;
            flex: 1 1 0; max-width: 80vw; word-break: break-word;
        }
        .banner-logo {
            height: 120px; align-self: flex-start;
            margin-top: 22px; margin-left: 18px; max-width: 22vw; width: auto;
        }
        @media (max-width: 900px) {
            .banner-title { font-size: 1.3rem; }
            .banner-header { height: 80px; padding: 0 2vw; }
            .banner-logo { height: 70px; margin-top: 6px; margin-left: 8px; }
        }

        /* ── Page wrapper ── */
        .page { padding: 0 2vw 48px 2vw; box-sizing: border-box; }

        /* ── Map + blurb ── */
        .map-blurb-row {
            display: flex; flex-direction: row; align-items: stretch;
            gap: 2vw; width: 100%; margin-bottom: 32px;
        }
        #map {
            flex: 1 1 0; min-width: 220px; max-width: 900px;
            aspect-ratio: 9/5; min-height: 320px; max-height: 600px;
            border-radius: 12px; box-shadow: 0 2px 12px #0004; background: #fff;
        }
        .blurb-box {
            width: 340px; flex-shrink: 0;
            background: #FFC600; border-radius: 12px;
            padding: 18px 16px; box-sizing: border-box;
            color: #002858; display: flex; flex-direction: column;
            box-shadow: 0 2px 12px #0003;
        }
        .blurb-label {
            font-size: 1.5rem; font-weight: bold; margin: 0 0 10px 0; color: #002858;
        }

        /* ── Controls ── */
        .controls {
            display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
            margin-bottom: 28px;
        }
        .controls label { color: #FFC600; font-weight: bold; font-size: 1em; }
        .controls select {
            font-size: 0.97em; padding: 5px 10px;
            border-radius: 6px; border: none; cursor: pointer;
            background: #fff; color: #002858;
        }
        #lastUpdated { color: #BAA890; font-size: 0.88em; }

        /* ── Section labels ── */
        .section-label {
            font-size: 1.15rem; font-weight: bold; color: #FFC600;
            margin: 0 0 14px 0; padding-bottom: 8px;
            border-bottom: 2px solid #A7641C44;
            letter-spacing: 0.4px;
        }

        /* ── Full-width charts (EC+Precip per site) ── */
        .full-chart-block {
            width: calc(100% - 32px); margin: 0 16px 28px 16px;
            background: #fff; border-radius: 12px;
            padding: 16px 20px 18px 20px; box-sizing: border-box;
            box-shadow: 0 2px 12px #0003;
        }
        .full-chart-title {
            font-size: 1.05rem; font-weight: bold; color: #002858;
            margin-bottom: 10px; padding-bottom: 6px;
            border-bottom: 2px solid #FFC60044;
        }
        .full-canvas { width: 100% !important; height: 260px !important; }

        /* ── Per-site sections ── */
        .site-section { margin-bottom: 36px; }
        .site-section-title {
            font-size: 1.1rem; font-weight: bold;
            margin: 0 0 14px 8px; padding-bottom: 6px;
            border-bottom: 2px solid #A7641C33;
            letter-spacing: 0.3px;
        }
        .site-grid {
            display: flex; flex-direction: row; flex-wrap: wrap; gap: 20px;
            padding: 0 8px;
        }
        .site-chart-block {
            flex: 1 1 340px; min-width: 280px; max-width: 620px;
            background: #fff; border-radius: 12px;
            padding: 14px 18px 16px 18px; box-sizing: border-box;
            box-shadow: 0 2px 10px #0002;
        }
        .site-chart-title {
            font-size: 0.95em; font-weight: bold; color: #002858;
            margin-bottom: 8px; padding-bottom: 4px;
            border-bottom: 1px solid #FFC60033;
            text-align: center;
        }
        .site-canvas { width: 100% !important; height: 200px !important; }

        .loading { color: #BFF1D8; margin: 8px 0; }
        .error-msg { color: #FC4D0F; margin: 8px 0; }
        #statusMessage { margin-bottom: 12px; }

        @media (max-width: 700px) {
            .map-blurb-row { flex-direction: column; }
            .blurb-box { width: 100%; order: -1; }
            #map { max-width: 100%; min-height: 240px; aspect-ratio: unset; height: 260px; }
            .full-chart-block { width: calc(100% - 16px); margin: 0 8px 20px 8px; }
            .site-grid { flex-direction: column; }
            .site-chart-block { max-width: 100%; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

<div class="banner-header">
    <h1 class="banner-title">Lake Vickers Data</h1>
    <img src="Logo.png" alt="Logo" class="banner-logo">
</div>

<div class="page">

    <div class="map-blurb-row">
        <div id="map"></div>
        <div class="blurb-box">
            <span class="blurb-label">About the Project</span>
            <p style="margin:0;line-height:1.6;font-size:1.05em;">blurb</p>
        </div>
    </div>

    <div class="controls">
        <label for="range">Show data for:</label>
        <select id="range">
            <option value="1">Past 24 hours</option>
            <option value="3">Past 3 days</option>
            <option value="7" selected>Past week</option>
        </select>
        <span id="lastUpdated"></span>
    </div>

    <div id="statusMessage"></div>

    <!-- Per-site EC + Precip charts -->
    <div class="section-label">Salinity &amp; Rainfall</div>
    <div class="full-chart-block">
        <div class="full-chart-title" id="title-site0"></div>
        <canvas id="chart-site0-ec-precip" class="full-canvas"></canvas>
    </div>
    <div class="full-chart-block">
        <div class="full-chart-title" id="title-site1"></div>
        <canvas id="chart-site1-ec-precip" class="full-canvas"></canvas>
    </div>

    <!-- Per-site Water Level + Temperature -->
    <div class="section-label" style="margin-top:8px;">Water Level &amp; Temperature</div>
    <div id="siteSections"></div>

</div>

<script>
    // ── BMC Colors ────────────────────────────────────────────────────────
    // Site colors: Front Basin = Evergreen, Lake Vickers = Bronze
    // EC line: site color | Precip fill: Wisteria | Temp: Blaze | Water Level: Patina border / Evergreen
    const BMC = {
        navy:       '#002858',
        lantern:    '#FFC600',
        bronze:     '#A7641C',
        evergreen:  '#215834',
        wisteria:   '#A6B0EF',
        blaze:      '#FC4D0F',
        coral:      '#FF9E79',
        patina:     '#BFF1D8',
        stone:      '#BAA890',
    };

    const baseUrl = (window.location.hostname === 'localhost')
        ? 'http://localhost:3000'
        : 'https://vickers-zentra.onrender.com';

    const sites = [
        { name: "Front Basin",  sn: "z6-29888", lat: 40.0275048,  lng: -75.316367,  color: BMC.evergreen },
        { name: "Lake Vickers", sn: "z6-29887", lat: 40.0278856,  lng: -75.3167732, color: BMC.bronze }
    ];

    let chartInstances = [];

    // ── Map ───────────────────────────────────────────────────────────────
    const map = L.map('map').setView([40.02770, -75.31660], 17);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
        { attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors' }
    ).addTo(map);
    sites.forEach(site => {
        const marker = L.marker([site.lat, site.lng]).addTo(map);
        marker.bindPopup(`<b>${site.name}</b>`);
        marker.on('mouseover', function () { this.openPopup(); });
        marker.on('mouseout',  function () { this.closePopup(); });
        marker.on('click', () => {
            const el = document.getElementById(`site-${site.sn}`);
            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
    });

    // ── Helpers ───────────────────────────────────────────────────────────
    function getRangeDays() { return parseInt(document.getElementById('range').value, 10); }

    function getStartDate(days) {
        return new Date(Date.now() - days * 86400000).toISOString().slice(0, 10);
    }

    function filterByDays(readings, days) {
        const cutoff = new Date(Date.now() - days * 86400000);
        return readings.filter(r =>
            new Date(r.datetime) >= cutoff &&
            r.value !== null && r.value !== undefined && !r.error_flag
        );
    }

    function shouldSkipEntry(key, entry) {
        const port = entry.metadata?.port_number ?? null;
        const k = key.toLowerCase();
        if (k === 'ec' && port === 5) return true;
        const readings = entry.readings || [];
        if (readings.length > 0 && readings.every(r => r.error_flag || r.value === null)) return true;
        return false;
    }

    function getBestEntry(arr, key) {
        const valid = arr.filter(e => !shouldSkipEntry(key, e));
        if (!valid.length) return null;
        return valid.find(e => e.metadata?.port_number === 2) || valid[0];
    }

    function destroyAllCharts() {
        chartInstances.forEach(c => { try { c.destroy(); } catch(e){} });
        chartInstances = [];
    }

    function setStatus(msg, isError) {
        document.getElementById('statusMessage').innerHTML =
            `<div class="${isError ? 'error-msg' : 'loading'}">${msg}</div>`;
    }

    function timeAxis() {
        return {
            type: 'time',
            time: {
                parser: 'yyyy-MM-dd HH:mm:ssXXX',
                tooltipFormat: 'PP HH:mm',
                unit: 'hour',
                displayFormats: { hour: 'MMM d, HH:mm' }
            },
            ticks: { color: '#002858' },
            grid: { color: '#00285810' }
        };
    }

    function makeChart(canvasId, datasets, yLabel, beginAtZero, extraOptions) {
        const canvas = document.getElementById(canvasId);
        if (!canvas) return;
        const opts = Object.assign({
            responsive: true,
            maintainAspectRatio: false,
            animation: false,
            plugins: {
                legend: { display: datasets.length > 1, position: 'top',
                    labels: { color: '#002858', font: { size: 12 } } }
            },
            elements: { line: { borderWidth: 2 }, point: { radius: 0 } },
            scales: {
                x: timeAxis(),
                y: {
                    beginAtZero: !!beginAtZero,
                    title: { display: !!yLabel, text: yLabel, font: { size: 11 }, color: '#002858' },
                    ticks: { color: '#002858' },
                    grid: { color: '#00285810' }
                }
            }
        }, extraOptions || {});
        const chart = new Chart(canvas.getContext('2d'), {
            type: 'line', data: { datasets }, options: opts
        });
        chartInstances.push(chart);
    }

    // ── Fetch ─────────────────────────────────────────────────────────────
    async function fetchDevice(sn, days) {
        const params = new URLSearchParams({
            device_sn: sn, per_page: 1000000, start_date: getStartDate(days)
        });
        const res = await fetch(`${baseUrl}/zentra?${params}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const json = await res.json();
        if (!json.devices?.length) throw new Error('No device data returned');
        const device = json.devices[0];
        if (device.error) throw new Error(`Zentra: ${device.status}`);
        return device;
    }

    // ── Main load ─────────────────────────────────────────────────────────
    async function loadAll() {
        const days = getRangeDays();
        destroyAllCharts();
        document.getElementById('siteSections').innerHTML = '';
        document.getElementById('lastUpdated').textContent = '';
        setStatus('Loading sensor data…');

        const results = await Promise.all(
            sites.map(async site => {
                try {
                    const device = await fetchDevice(site.sn, days);
                    return { site, device, error: null };
                } catch(e) {
                    return { site, device: null, error: e.message };
                }
            })
        );

        document.getElementById('statusMessage').innerHTML = '';

        // ── Per-site EC + Precip dual-axis charts ─────────────────────────
        results.forEach(({ site, device }, idx) => {
            document.getElementById(`title-site${idx}`).textContent = site.name;
            if (!device) return;

            const datasets = [];

            const ecEntry = device.data?.EC ? getBestEntry(device.data.EC, 'EC') : null;
            if (ecEntry) {
                const readings = filterByDays(ecEntry.readings || [], days);
                if (readings.length) {
                    datasets.push({
                        label: 'Salinity (mS/cm)',
                        data: readings.map(r => ({ x: r.datetime, y: r.value })),
                        fill: false,
                        borderColor: site.color,
                        backgroundColor: site.color + '22',
                        borderWidth: 2, tension: 0.1, pointRadius: 0,
                        yAxisID: 'yEC'
                    });
                }
            }

            const precipEntry = device.data?.Precipitation ? getBestEntry(device.data.Precipitation, 'Precipitation') : null;
            if (precipEntry) {
                const readings = filterByDays(precipEntry.readings || [], days);
                if (readings.length) {
                    datasets.push({
                        label: 'Rainfall (mm)',
                        data: readings.map(r => ({ x: r.datetime, y: r.value })),
                        fill: true,
                        borderColor: BMC.wisteria,
                        backgroundColor: BMC.wisteria + '55',
                        borderWidth: 2, tension: 0.1, pointRadius: 0,
                        yAxisID: 'yPrecip'
                    });
                }
            }

            if (!datasets.length) return;
            const canvas = document.getElementById(`chart-site${idx}-ec-precip`);
            if (!canvas) return;
            const chart = new Chart(canvas.getContext('2d'), {
                type: 'line',
                data: { datasets },
                options: {
                    responsive: true, maintainAspectRatio: false, animation: false,
                    plugins: {
                        legend: { display: true, position: 'top',
                            labels: { color: '#002858', font: { size: 12 } } }
                    },
                    elements: { line: { borderWidth: 2 }, point: { radius: 0 } },
                    scales: {
                        x: timeAxis(),
                        yEC: {
                            type: 'linear', position: 'left', beginAtZero: false,
                            title: { display: true, text: 'Salinity (mS/cm)', font: { size: 11 }, color: site.color },
                            ticks: { color: site.color },
                            grid: { color: '#00285810' }
                        },
                        yPrecip: {
                            type: 'linear', position: 'right', beginAtZero: true,
                            title: { display: true, text: 'Rainfall (mm)', font: { size: 11 }, color: BMC.wisteria },
                            ticks: { color: BMC.wisteria },
                            grid: { drawOnChartArea: false }
                        }
                    }
                }
            });
            chartInstances.push(chart);
        });

        // ── Per-site Water Level + Temperature ────────────────────────────
        let siteSectionsHtml = '';
        results.forEach(({ site, device, error }) => {
            if (!device) {
                siteSectionsHtml += `<div class="site-section" id="site-${site.sn}">
                    <div class="site-section-title" style="color:${site.color}">${site.name}</div>
                    <div class="error-msg" style="padding:0 8px;">Failed to load: ${error || 'Unknown error'}</div>
                </div>`;
                return;
            }
            const perSiteKeys = ['Water Level', 'Water Temperature'];
            let blocksHtml = '';
            perSiteKeys.forEach(key => {
                const arr = device.data?.[key];
                if (!arr) return;
                const entry = getBestEntry(arr, key);
                if (!entry) return;
                const readings = filterByDays(entry.readings || [], days);
                if (!readings.length) return;
                const units = (entry.metadata?.units || '').trim();
                const chartId = `chart-${site.sn}-${key.replace(/\s/g, '_')}`;
                blocksHtml += `
                    <div class="site-chart-block">
                        <div class="site-chart-title">${key}${units ? ' (' + units + ')' : ''}</div>
                        <canvas id="${chartId}" class="site-canvas"></canvas>
                    </div>`;
            });
            if (blocksHtml) {
                siteSectionsHtml += `
                    <div class="site-section" id="site-${site.sn}">
                        <div class="site-section-title" style="color:${site.color}">${site.name}</div>
                        <div class="site-grid">${blocksHtml}</div>
                    </div>`;
            }
        });

        document.getElementById('siteSections').innerHTML = siteSectionsHtml;

        // Build per-site charts now that canvases are in DOM
        results.forEach(({ site, device }) => {
            if (!device) return;

            // Water Level — Patina/Evergreen
            const wlArr = device.data?.['Water Level'];
            if (wlArr) {
                const entry = getBestEntry(wlArr, 'Water Level');
                if (entry) {
                    const readings = filterByDays(entry.readings || [], days);
                    if (readings.length) {
                        const units = (entry.metadata?.units || '').trim();
                        makeChart(`chart-${site.sn}-Water_Level`, [{
                            label: 'Water Level',
                            data: readings.map(r => ({ x: r.datetime, y: r.value })),
                            fill: true,
                            borderColor: BMC.evergreen,
                            backgroundColor: BMC.patina + '88',
                            borderWidth: 2, tension: 0.1, pointRadius: 0
                        }], units, false);
                    }
                }
            }

            // Water Temperature — Blaze/Coral
            const wtArr = device.data?.['Water Temperature'];
            if (wtArr) {
                const entry = getBestEntry(wtArr, 'Water Temperature');
                if (entry) {
                    const readings = filterByDays(entry.readings || [], days);
                    if (readings.length) {
                        const units = (entry.metadata?.units || '').trim();
                        makeChart(`chart-${site.sn}-Water_Temperature`, [{
                            label: 'Water Temperature',
                            data: readings.map(r => ({ x: r.datetime, y: r.value })),
                            fill: true,
                            borderColor: BMC.blaze,
                            backgroundColor: BMC.coral + '66',
                            borderWidth: 2, tension: 0.1, pointRadius: 0
                        }], units, false);
                    }
                }
            }
        });

        document.getElementById('lastUpdated').textContent =
            `Data loaded: ${new Date().toLocaleString()}`;
    }

    document.getElementById('range').addEventListener('change', loadAll);
    loadAll();
</script>
</body>
</html>
